<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mein Kochbuch</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; }
  .header { background: #fff; border-bottom: 1px solid rgba(0,0,0,0.1); padding: 0 2rem; display: flex; align-items: center; gap: 1rem; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 20px; font-weight: 500; color: #1a1a18; flex: 1; display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .header-actions { display: flex; gap: 8px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.2); background: transparent; cursor: pointer; font-size: 13px; font-weight: 500; color: #1a1a18; transition: background 0.15s; font-family: inherit; }
  .btn:hover { background: #f1efe8; }
  .btn-primary { background: #185fa5; color: #fff; border-color: transparent; }
  .btn-primary:hover { background: #0c4a82; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-danger { color: #a32d2d; border-color: rgba(163,45,45,0.3); }
  .btn-danger:hover { background: #fcebeb; }
  .app { display: flex; min-height: calc(100vh - 56px); }
  .sidebar { width: 220px; flex-shrink: 0; background: #f1efe8; border-right: 1px solid rgba(0,0,0,0.08); padding: 1.25rem 0; overflow-y: auto; }
  .sidebar-section { margin-bottom: 1.5rem; }
  .sidebar-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #999; padding: 0 1rem 0.4rem; }
  .sidebar-item { display: flex; align-items: center; gap: 8px; padding: 7px 1rem; cursor: pointer; font-size: 14px; color: #5f5e5a; border-left: 2px solid transparent; transition: all 0.1s; user-select: none; }
  .sidebar-item:hover { background: #f5f4f0; color: #1a1a18; }
  .sidebar-item.active { background: #fff; color: #1a1a18; border-left-color: #185fa5; font-weight: 500; }
  .sidebar-item .count { margin-left: auto; font-size: 11px; background: #f5f4f0; color: #999; padding: 1px 6px; border-radius: 10px; }
  .sidebar-add-cat { display: flex; align-items: center; gap: 6px; padding: 6px 1rem; cursor: pointer; font-size: 13px; color: #999; transition: color 0.1s; }
  .sidebar-add-cat:hover { color: #1a1a18; }
  .main { flex: 1; overflow-y: auto; }
  .status-banner { padding: 8px 2rem; font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .status-ok { color: #3b6d11; background: #eaf3de; }
  .status-err { color: #a32d2d; background: #fcebeb; }
  .status-loading { color: #666; background: #f0f0f0; }
  .search-bar { padding: 1.25rem 2rem 0; display: flex; gap: 10px; }
  .search-input { flex: 1; padding: 8px 14px; border: 1px solid rgba(0,0,0,0.2); border-radius: 8px; background: #fff; font-size: 14px; color: #1a1a18; outline: none; }
  .search-input:focus { border-color: #185fa5; }
  .recipes-header { padding: 1rem 2rem 0.75rem; display: flex; align-items: baseline; justify-content: space-between; }
  .recipes-title { font-size: 18px; font-weight: 500; }
  .recipes-count { font-size: 13px; color: #999; }
  .recipe-grid { padding: 0 2rem 2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .recipe-card { background: #fff; border-radius: 12px; border: 1px solid rgba(0,0,0,0.08); overflow: hidden; cursor: pointer; transition: border-color 0.15s, transform 0.15s; }
  .recipe-card:hover { border-color: rgba(0,0,0,0.2); transform: translateY(-1px); }
  .card-img { width: 100%; height: 160px; background: #f1efe8; display: flex; align-items: center; justify-content: center; font-size: 40px; overflow: hidden; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-body { padding: 14px 16px 12px; }
  .card-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; line-height: 1.3; }
  .card-meta { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #888; margin-bottom: 10px; flex-wrap: wrap; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #f1efe8; color: #666; border: 1px solid rgba(0,0,0,0.08); }
  .diff-easy { background: #eaf3de; color: #3b6d11; border-color: #c0dd97; }
  .diff-medium { background: #faeeda; color: #854f0b; border-color: #fac775; }
  .diff-hard { background: #fcebeb; color: #a32d2d; border-color: #f7c1c1; }
  .empty-state { text-align: center; padding: 4rem 2rem; color: #999; grid-column: 1/-1; }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 1rem; }
  .empty-state h3 { font-size: 16px; font-weight: 500; color: #888; margin-bottom: 6px; }
  .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.45); display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; overflow-y: auto; }
  .modal { background: #fff; border-radius: 16px; border: 1px solid rgba(0,0,0,0.1); width: 100%; max-width: 680px; padding: 2rem; flex-shrink: 0; position: relative; }
  .modal-title { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; }
  .modal-close { position: absolute; top: 1.25rem; right: 1.25rem; background: none; border: none; cursor: pointer; color: #999; font-size: 22px; line-height: 1; }
  .modal-close:hover { color: #1a1a18; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 1rem; }
  .form-label { font-size: 13px; font-weight: 500; color: #666; }
  .form-input, .form-select, .form-textarea { padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.2); background: #f5f4f0; font-size: 14px; color: #1a1a18; font-family: inherit; outline: none; width: 100%; }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #185fa5; background: #fff; }
  .form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .cat-grid { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; background: #f5f4f0; border-radius: 8px; border: 1px solid rgba(0,0,0,0.2); max-height: 150px; overflow-y: auto; }
  .cat-check { display: none; }
  .cat-label { font-size: 12px; padding: 4px 10px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1); background: #fff; color: #666; cursor: pointer; transition: all 0.1s; user-select: none; }
  .cat-check:checked + .cat-label { background: #185fa5; color: #fff; border-color: transparent; }
  .list-editor { display: flex; flex-direction: column; gap: 6px; }
  .list-item-row { display: flex; gap: 6px; align-items: flex-start; }
  .list-item-num { min-width: 22px; height: 22px; border-radius: 50%; background: #f1efe8; border: 1px solid rgba(0,0,0,0.1); font-size: 11px; font-weight: 500; color: #999; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 8px; }
  .list-item-remove { background: none; border: none; cursor: pointer; color: #ccc; font-size: 20px; padding: 4px; transition: color 0.1s; line-height: 1; }
  .list-item-remove:hover { color: #a32d2d; }
  .add-row-btn { display: flex; align-items: center; gap: 6px; background: none; border: none; cursor: pointer; font-size: 13px; color: #185fa5; padding: 6px 0; font-family: inherit; }
  .section-divider { border: none; border-top: 1px solid rgba(0,0,0,0.08); margin: 1.25rem 0; }
  .detail-hero { width: 100%; height: 280px; background: #f1efe8; display: flex; align-items: center; justify-content: center; font-size: 64px; position: relative; overflow: hidden; }
  .detail-hero img { width: 100%; height: 100%; object-fit: cover; }
  .detail-back { position: absolute; top: 1rem; left: 1rem; background: rgba(255,255,255,0.92); border: 1px solid rgba(0,0,0,0.1); border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 13px; font-weight: 500; }
  .detail-back:hover { background: #fff; }
  .detail-content { padding: 1.5rem 2rem; }
  .detail-title { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 6px; }
  .detail-meta { display: flex; flex-wrap: wrap; gap: 16px; font-size: 13px; color: #888; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(0,0,0,0.08); }
  .detail-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; }
  .detail-section-title { font-size: 15px; font-weight: 600; margin-bottom: 0.75rem; }
  .ingredient-list { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.5rem; }
  .ingredient-item { display: flex; align-items: center; gap: 10px; font-size: 14px; padding: 8px 12px; background: #f5f4f0; border-radius: 8px; }
  .ingredient-item::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: #185fa5; flex-shrink: 0; }
  .step-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1.5rem; }
  .step-item { display: flex; gap: 14px; }
  .step-num { min-width: 28px; height: 28px; border-radius: 50%; background: #185fa5; color: #fff; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
  .step-text { font-size: 14px; line-height: 1.7; padding-top: 4px; }
  .notes-box { background: #faeeda; border-radius: 10px; padding: 14px 16px; font-size: 13px; line-height: 1.7; color: #633806; border-left: 3px solid #ef9f27; margin-bottom: 1.5rem; }
  .detail-actions { display: flex; gap: 8px; padding: 0 2rem 2rem; flex-wrap: wrap; }
  .nutrition-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .nutrition-box { background: #f5f4f0; border-radius: 8px; padding: 10px; text-align: center; }
  .nutrition-val { font-size: 16px; font-weight: 600; }
  .nutrition-lbl { font-size: 11px; color: #999; margin-top: 2px; }
  .toast { position: fixed; bottom: 2rem; right: 2rem; z-index: 999; background: #1a1a18; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(0,0,0,0.15); border-top-color: #185fa5; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 6px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .emoji-btn { font-size: 20px; padding: 5px 9px; border-radius: 6px; background: #f5f4f0; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; transition: background 0.1s; }
  .emoji-btn:hover, .emoji-btn.selected { background: #dbeafe; border-color: #185fa5; }
  @media (max-width: 640px) {
    .sidebar { display: none; }
    .form-grid { grid-template-columns: 1fr; }
    .nutrition-grid { grid-template-columns: repeat(2,1fr); }
    .detail-content { padding: 1rem; }
    .recipe-grid { padding: 0 1rem 2rem; }
  }
</style>
</head>
<body>

<div id="root"></div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://eokqjhigaaoofphnbsyu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_T5QksHLHboaQgKVsotmVsg_phT5PgBM';

const DEFAULT_CATEGORIES = [
  { id: 'salat', name: 'Salate', emoji: '🥗', sort_order: 0 },
  { id: 'suppe', name: 'Suppen', emoji: '🍲', sort_order: 1 },
  { id: 'pasta', name: 'Pasta', emoji: '🍝', sort_order: 2 },
  { id: 'proteinreich', name: 'Proteinreich', emoji: '💪', sort_order: 3 },
  { id: 'vegetarisch', name: 'Vegetarisch', emoji: '🥦', sort_order: 4 },
  { id: 'vegan', name: 'Vegan', emoji: '🌱', sort_order: 5 },
  { id: 'schnell', name: 'Schnell (<30 Min)', emoji: '⚡', sort_order: 6 },
  { id: 'mealprep', name: 'Meal Prep', emoji: '📦', sort_order: 7 },
  { id: 'fruehstueck', name: 'Frühstück', emoji: '🌅', sort_order: 8 },
  { id: 'mittagessen', name: 'Mittagessen', emoji: '☀️', sort_order: 9 },
  { id: 'abendessen', name: 'Abendessen', emoji: '🌙', sort_order: 10 },
  { id: 'dessert', name: 'Desserts', emoji: '🍰', sort_order: 11 },
  { id: 'snack', name: 'Snacks', emoji: '🫙', sort_order: 12 },
  { id: 'asiatisch', name: 'Asiatisch', emoji: '🥢', sort_order: 13 },
  { id: 'mediterran', name: 'Mediterran', emoji: '🫒', sort_order: 14 },
  { id: 'sommer', name: 'Sommer', emoji: '🌞', sort_order: 15 },
  { id: 'winter', name: 'Winter', emoji: '❄️', sort_order: 16 },
];

let db = { recipes: [], categories: [] };
let state = { view: 'loading', selectedCat: 'all', searchQuery: '', editingRecipe: null, detailRecipe: null, form: null, dbStatus: null, dbError: '' };

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
function getCat(id) { return db.categories.find(c => c.id === id) || { name: id, emoji: '📁' }; }

async function api(method, table, body, query) {
  const url = SUPABASE_URL + '/rest/v1/' + table + (query || '');
  const headers = {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Prefer': 'return=representation'
  };
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) {
    const e = await res.text();
    throw new Error('HTTP ' + res.status + ': ' + e);
  }
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

async function loadAll() {
  try {
    const [raws, cats] = await Promise.all([
      api('GET', 'recipes', null, '?select=*&order=created_at.desc'),
      api('GET', 'categories', null, '?select=*&order=sort_order.asc')
    ]);
    db.recipes = (raws || []).map(r => ({ ...r.data, id: r.id, created_at: r.created_at }));
    if (!cats || cats.length === 0) {
      await Promise.all(DEFAULT_CATEGORIES.map(c => api('POST', 'categories', c)));
      db.categories = [...DEFAULT_CATEGORIES];
    } else {
      db.categories = cats;
    }
    state.view = 'list';
    state.dbStatus = 'ok';
  } catch(e) {
    state.view = 'list';
    state.dbStatus = 'error';
    state.dbError = e.message;
    db.categories = [...DEFAULT_CATEGORIES];
    console.error('Supabase Fehler:', e);
  }
  render();
}

async function saveRecipe() {
  const f = state.form;
  if (!f.title.trim()) { showToast('Bitte einen Titel eingeben'); return; }
  const id = state.editingRecipe || uid();
  const recipeData = {
    title: f.title.trim(), description: f.description, servings: f.servings,
    timePrep: f.timePrep, timeCook: f.timeCook, difficulty: f.difficulty,
    categories: f.categories,
    ingredients: f.ingredients.filter(i => i.text && i.text.trim()),
    dressing: f.hasDressing ? f.dressing.filter(i => i.text && i.text.trim()) : [],
    hasDressing: f.hasDressing,
    steps: f.steps.filter(s => s.text && s.text.trim()),
    notes: f.notes, sourceUrl: f.sourceUrl,
    kcal: f.kcal, protein: f.protein, carbs: f.carbs, fat: f.fat,
    season: f.season, image: f.image, favorite: f.favorite || false,
  };
  try {
    if (state.editingRecipe) {
      await api('PATCH', 'recipes', { title: recipeData.title, data: recipeData }, '?id=eq.' + id);
      db.recipes = db.recipes.map(r => r.id === id ? { ...recipeData, id } : r);
      showToast('Rezept gespeichert ✓');
    } else {
      await api('POST', 'recipes', { id, title: recipeData.title, data: recipeData });
      db.recipes.unshift({ ...recipeData, id });
      showToast('Rezept hinzugefügt ✓');
    }
  } catch(e) { showToast('Fehler beim Speichern: ' + e.message); console.error(e); return; }
  state.view = 'list'; state.detailRecipe = null; state.editingRecipe = null; state.form = null;
  render();
}

async function deleteRecipe(recipe) {
  if (!confirm('Rezept "' + recipe.title + '" wirklich löschen?')) return;
  try {
    await api('DELETE', 'recipes', null, '?id=eq.' + recipe.id);
    db.recipes = db.recipes.filter(r => r.id !== recipe.id);
    state.view = 'list'; state.detailRecipe = null; render();
    showToast('Rezept gelöscht');
  } catch(e) { showToast('Fehler: ' + e.message); }
}

async function toggleFav(recipe) {
  recipe.favorite = !recipe.favorite;
  try {
    await api('PATCH', 'recipes', { data: { ...recipe } }, '?id=eq.' + recipe.id);
    db.recipes = db.recipes.map(r => r.id === recipe.id ? recipe : r);
    render(); showToast(recipe.favorite ? '⭐ Als Favorit gespeichert' : 'Favorit entfernt');
  } catch(e) { showToast('Fehler: ' + e.message); }
}

async function addCategory(name, emoji) {
  const cat = { id: uid(), name: name.trim(), emoji, sort_order: db.categories.length };
  try {
    await api('POST', 'categories', cat);
    db.categories.push(cat);
    state.view = 'list'; render();
    showToast('Kategorie "' + cat.name + '" erstellt');
  } catch(e) { showToast('Fehler: ' + e.message); }
}

function blankForm() {
  return { title:'', description:'', servings:'2', timePrep:'', timeCook:'', difficulty:'easy',
    categories:[], ingredients:[{id:uid(),text:''}], dressing:[{id:uid(),text:''}],
    hasDressing:false, steps:[{id:uid(),text:''}], notes:'', sourceUrl:'',
    kcal:'', protein:'', carbs:'', fat:'', season:'', image:'', favorite:false };
}

function render() {
  document.getElementById('root').innerHTML = '';
  document.getElementById('root').appendChild(buildApp());
}

function buildApp() {
  const wrap = el('div');
  wrap.appendChild(buildHeader());
  const body = el('div', {class:'app'});
  if (state.view !== 'detail') body.appendChild(buildSidebar());
  const main = el('div', {class:'main'});
  if (state.view === 'loading') {
    const b = el('div', {class:'status-banner status-loading'});
    b.innerHTML = '<span class="spinner"></span> Verbinde mit Datenbank…';
    main.appendChild(b);
  } else {
    if (state.dbStatus === 'error') {
      const b = el('div', {class:'status-banner status-err'});
      b.innerHTML = '⚠ Datenbankfehler: ' + state.dbError + ' — Bitte SQL-Schema in Supabase prüfen.';
      main.appendChild(b);
    } else if (state.dbStatus === 'ok') {
      const b = el('div', {class:'status-banner status-ok'});
      b.textContent = '✓ Mit Supabase verbunden – Rezepte werden für alle gespeichert';
      main.appendChild(b);
    }
    if (state.view === 'list') main.appendChild(buildListView());
    else if (state.view === 'detail' && state.detailRecipe) main.appendChild(buildDetailView(state.detailRecipe));
  }
  body.appendChild(main);
  wrap.appendChild(body);
  if (state.view === 'add' || state.view === 'edit') wrap.appendChild(buildRecipeModal());
  if (state.view === 'addCat') wrap.appendChild(buildCatModal());
  return wrap;
}

function buildHeader() {
  const h = el('header', {class:'header'});
  const logo = el('div', {class:'logo'});
  logo.innerHTML = '📖 Mein Kochbuch';
  logo.onclick = () => { state.view='list'; state.selectedCat='all'; render(); };
  h.appendChild(logo);
  const actions = el('div', {class:'header-actions'});

  const importBtn = el('button', {class:'btn btn-sm'});
  importBtn.textContent = '↑ Import';
  importBtn.onclick = () => {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.json';
    inp.onchange = async e => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const imported = JSON.parse(text);
        if (!imported.recipes || !Array.isArray(imported.recipes)) throw new Error('Ungültiges Format');
        const existingIds = new Set(db.recipes.map(r => r.id));
        const newRecipes = imported.recipes.filter(r => !existingIds.has(r.id));
        if (newRecipes.length === 0) { showToast('Keine neuen Rezepte gefunden – alle bereits vorhanden'); return; }
        let saved = 0;
        for (const recipe of newRecipes) {
          try {
            await api('POST', 'recipes', { id: recipe.id, title: recipe.title, data: recipe });
            db.recipes.unshift(recipe);
            saved++;
          } catch(err) { console.error('Fehler bei Rezept ' + recipe.title, err); }
        }
        showToast(saved + ' neue Rezepte importiert ✓');
        render();
      } catch(err) { showToast('Fehler beim Import: ' + err.message); }
    };
    inp.click();
  };

  const exportBtn = el('button', {class:'btn btn-sm'});
  exportBtn.textContent = '↓ Export';
  exportBtn.onclick = () => {
    const exportData = { recipes: db.recipes, categories: db.categories, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'kochbuch-export.json'; a.click();
    URL.revokeObjectURL(url);
    showToast('Kochbuch exportiert (' + db.recipes.length + ' Rezepte)');
  };

  const addBtn = el('button', {class:'btn btn-primary btn-sm'});
  addBtn.textContent = '+ Rezept hinzufügen';
  addBtn.onclick = () => { state.form=blankForm(); state.view='add'; state.editingRecipe=null; render(); };
  actions.append(importBtn, exportBtn, addBtn);
  h.appendChild(actions);
  return h;
}

function buildSidebar() {
  const s = el('aside', {class:'sidebar'});
  const sec1 = el('div', {class:'sidebar-section'});
  const lbl1 = el('div', {class:'sidebar-label'}); lbl1.textContent='Übersicht'; sec1.appendChild(lbl1);
  [['all','📋 Alle Rezepte', db.recipes.length],['fav','⭐ Favoriten', db.recipes.filter(r=>r.favorite).length]].forEach(([id,label,count]) => {
    const item = el('div', {class:'sidebar-item'+(state.selectedCat===id?' active':'')});
    item.innerHTML = label;
    const cnt = el('span',{class:'count'}); cnt.textContent=count; item.appendChild(cnt);
    item.onclick = () => { state.selectedCat=id; state.view='list'; render(); };
    sec1.appendChild(item);
  });
  s.appendChild(sec1);
  const sec2 = el('div', {class:'sidebar-section'});
  const lbl2 = el('div', {class:'sidebar-label'}); lbl2.textContent='Kategorien'; sec2.appendChild(lbl2);
  db.categories.forEach(cat => {
    const count = db.recipes.filter(r => r.categories && r.categories.includes(cat.id)).length;
    const item = el('div', {class:'sidebar-item'+(state.selectedCat===cat.id?' active':'')});
    item.innerHTML = cat.emoji + ' ' + cat.name;
    const cnt = el('span',{class:'count'}); cnt.textContent=count; item.appendChild(cnt);
    item.onclick = () => { state.selectedCat=cat.id; state.view='list'; render(); };
    sec2.appendChild(item);
  });
  const addCatBtn = el('div', {class:'sidebar-add-cat'});
  addCatBtn.textContent = '+ Kategorie hinzufügen';
  addCatBtn.onclick = () => { state.view='addCat'; render(); };
  sec2.appendChild(addCatBtn);
  s.appendChild(sec2);
  return s;
}

function buildListView() {
  const wrap = el('div');
  const sb = el('div', {class:'search-bar'});
  const sinp = el('input', {class:'search-input', placeholder:'Rezepte suchen…', type:'text'});
  sinp.value = state.searchQuery;
  sinp.oninput = e => { state.searchQuery=e.target.value; render(); };
  sb.appendChild(sinp); wrap.appendChild(sb);
  let recipes = db.recipes;
  if (state.selectedCat==='fav') recipes=recipes.filter(r=>r.favorite);
  else if (state.selectedCat!=='all') recipes=recipes.filter(r=>r.categories&&r.categories.includes(state.selectedCat));
  if (state.searchQuery.trim()) { const q=state.searchQuery.toLowerCase(); recipes=recipes.filter(r=>r.title.toLowerCase().includes(q)||(r.description||'').toLowerCase().includes(q)); }
  const rh = el('div', {class:'recipes-header'});
  const catName = state.selectedCat==='all'?'Alle Rezepte':state.selectedCat==='fav'?'Favoriten':getCat(state.selectedCat).name;
  const rt=el('div',{class:'recipes-title'}); rt.textContent=catName;
  const rc=el('div',{class:'recipes-count'}); rc.textContent=recipes.length+' Rezepte';
  rh.append(rt,rc); wrap.appendChild(rh);
  const grid = el('div', {class:'recipe-grid'});
  if (recipes.length===0) {
    const empty=el('div',{class:'empty-state'}); empty.innerHTML='<div class="empty-icon">🍽️</div><h3>Noch keine Rezepte</h3><p>Füge dein erstes Rezept über den Button oben hinzu.</p>'; grid.appendChild(empty);
  } else { recipes.forEach(r=>grid.appendChild(buildCard(r))); }
  wrap.appendChild(grid);
  return wrap;
}

function buildCard(recipe) {
  const card=el('div',{class:'recipe-card'});
  card.onclick=()=>{state.detailRecipe=recipe;state.view='detail';render();};
  const imgWrap=el('div',{class:'card-img'});
  if (recipe.image){const img=el('img');img.src=recipe.image;img.alt=recipe.title;imgWrap.appendChild(img);}
  else imgWrap.textContent='🍳';
  card.appendChild(imgWrap);
  const body=el('div',{class:'card-body'});
  const t=el('div',{class:'card-title'});t.textContent=recipe.title;body.appendChild(t);
  const meta=el('div',{class:'card-meta'});
  const total=(parseInt(recipe.timePrep)||0)+(parseInt(recipe.timeCook)||0);
  if(total)meta.innerHTML+='<span>⏱ '+total+' Min</span>';
  if(recipe.servings)meta.innerHTML+='<span>👥 '+recipe.servings+'</span>';
  if(recipe.difficulty){const dl={easy:'Einfach',medium:'Mittel',hard:'Schwer'}[recipe.difficulty];meta.innerHTML+='<span class="tag diff-'+recipe.difficulty+'">'+dl+'</span>';}
  if(recipe.favorite)meta.innerHTML+='<span>⭐</span>';
  body.appendChild(meta);
  const tags=el('div',{class:'card-tags'});
  (recipe.categories||[]).slice(0,3).forEach(cid=>{const c=getCat(cid);const t2=el('span',{class:'tag'});t2.textContent=c.emoji+' '+c.name;tags.appendChild(t2);});
  body.appendChild(tags);card.appendChild(body);
  return card;
}

function buildDetailView(recipe) {
  const wrap=el('div');
  const hero=el('div',{class:'detail-hero'});
  if(recipe.image){const img=el('img');img.src=recipe.image;img.alt=recipe.title;hero.appendChild(img);}
  else hero.textContent='🍳';
  const back=el('div',{class:'detail-back'});back.textContent='← Zurück';
  back.onclick=()=>{state.view='list';state.detailRecipe=null;render();};
  hero.appendChild(back);wrap.appendChild(hero);
  const c=el('div',{class:'detail-content'});
  const title=el('h1',{class:'detail-title'});title.textContent=recipe.title;c.appendChild(title);
  if(recipe.description){const d=el('p',{style:'font-size:14px;color:#888;margin-bottom:1rem;line-height:1.6'});d.textContent=recipe.description;c.appendChild(d);}
  const meta=el('div',{class:'detail-meta'});
  const tp=parseInt(recipe.timePrep)||0,tc=parseInt(recipe.timeCook)||0;
  if(tp)meta.innerHTML+='<span>🔪 Vorbereitung: '+tp+' Min</span>';
  if(tc)meta.innerHTML+='<span>🍳 Kochzeit: '+tc+' Min</span>';
  if(tp+tc)meta.innerHTML+='<strong>⏱ Gesamt: '+(tp+tc)+' Min</strong>';
  if(recipe.servings)meta.innerHTML+='<span>👥 '+recipe.servings+' Portionen</span>';
  if(recipe.difficulty)meta.innerHTML+='<span>📊 '+{easy:'Einfach',medium:'Mittel',hard:'Schwer'}[recipe.difficulty]+'</span>';
  if(recipe.season)meta.innerHTML+='<span>📅 '+recipe.season+'</span>';
  c.appendChild(meta);
  const tags=el('div',{class:'detail-tags'});
  (recipe.categories||[]).forEach(cid=>{const cat=getCat(cid);const t=el('span',{class:'tag',style:'font-size:12px;padding:4px 10px'});t.textContent=cat.emoji+' '+cat.name;tags.appendChild(t);});
  c.appendChild(tags);
  if(recipe.kcal||recipe.protein||recipe.carbs||recipe.fat){
    const ng=el('div',{class:'nutrition-grid'});
    [['kcal','kcal','🔥'],['protein','Protein','💪'],['carbs','Kohlenhydrate','🌾'],['fat','Fett','🫒']].forEach(([k,l,icon])=>{if(recipe[k]){const b=el('div',{class:'nutrition-box'});b.innerHTML='<div class="nutrition-val">'+recipe[k]+(k==='kcal'?'':' g')+'</div><div class="nutrition-lbl">'+icon+' '+l+'</div>';ng.appendChild(b);}});
    c.appendChild(ng);
  }
  const vi=(recipe.ingredients||[]).filter(i=>i.text&&i.text.trim());
  if(vi.length){const h=el('h3',{class:'detail-section-title'});h.textContent='Zutaten';c.appendChild(h);const ul=el('ul',{class:'ingredient-list'});vi.forEach(i=>{const li=el('li',{class:'ingredient-item'});li.textContent=i.text;ul.appendChild(li);});c.appendChild(ul);}
  const vd=(recipe.dressing||[]).filter(i=>i.text&&i.text.trim());
  if(vd.length){const h=el('h3',{class:'detail-section-title'});h.textContent='Dressing';c.appendChild(h);const ul=el('ul',{class:'ingredient-list'});vd.forEach(i=>{const li=el('li',{class:'ingredient-item'});li.textContent=i.text;ul.appendChild(li);});c.appendChild(ul);}
  const vs=(recipe.steps||[]).filter(s=>s.text&&s.text.trim());
  if(vs.length){const h=el('h3',{class:'detail-section-title'});h.textContent='Zubereitung';c.appendChild(h);const sl=el('div',{class:'step-list'});vs.forEach((s,i)=>{const row=el('div',{class:'step-item'});const n=el('div',{class:'step-num'});n.textContent=i+1;const t=el('div',{class:'step-text'});t.textContent=s.text;row.append(n,t);sl.appendChild(row);});c.appendChild(sl);}
  if(recipe.notes&&recipe.notes.trim()){const h=el('h3',{class:'detail-section-title'});h.textContent='Tipps & Notizen';c.appendChild(h);const nb=el('div',{class:'notes-box'});nb.textContent=recipe.notes;c.appendChild(nb);}
  if(recipe.sourceUrl&&recipe.sourceUrl.trim()){const src=el('p',{style:'font-size:13px;color:#999;margin-bottom:1.5rem'});src.innerHTML='🔗 Quelle: <a href="'+recipe.sourceUrl+'" target="_blank" style="color:#185fa5">'+recipe.sourceUrl+'</a>';c.appendChild(src);}
  wrap.appendChild(c);
  const actions=el('div',{class:'detail-actions'});
  const fav=el('button',{class:'btn'});fav.textContent=recipe.favorite?'⭐ Favorit entfernen':'☆ Favorit';fav.onclick=()=>toggleFav(recipe);
  const edit=el('button',{class:'btn'});edit.textContent='✏️ Bearbeiten';edit.onclick=()=>{state.form={...recipe,ingredients:recipe.ingredients||[{id:uid(),text:''}],dressing:recipe.dressing||[{id:uid(),text:''}],steps:recipe.steps||[{id:uid(),text:''}]};state.editingRecipe=recipe.id;state.view='edit';render();};
  const del=el('button',{class:'btn btn-danger'});del.textContent='🗑 Löschen';del.onclick=()=>deleteRecipe(recipe);
  actions.append(fav,edit,del);wrap.appendChild(actions);
  return wrap;
}

function buildRecipeModal() {
  const overlay=el('div',{class:'modal-overlay'});
  overlay.onclick=e=>{if(e.target===overlay){state.view='list';render();}};
  const modal=el('div',{class:'modal'});
  const close=el('button',{class:'modal-close'});close.textContent='×';close.onclick=()=>{state.view='list';render();};modal.appendChild(close);
  const title=el('div',{class:'modal-title'});title.textContent=state.view==='edit'?'Rezept bearbeiten':'Neues Rezept';modal.appendChild(title);
  const f=state.form;
  // Image
  const imgGrp=el('div',{class:'form-group'});
  const imgLbl=el('label',{class:'form-label'});imgLbl.textContent='Foto';imgGrp.appendChild(imgLbl);
  if(f.image){
    const img=el('img',{style:'width:100%;max-height:180px;object-fit:cover;border-radius:8px;display:block'});img.src=f.image;
    const rm=el('button',{class:'btn btn-sm btn-danger',style:'margin-top:6px'});rm.textContent='× Foto entfernen';rm.onclick=()=>{f.image='';render();};
    imgGrp.append(img,rm);
  } else {
    const up=el('input',{type:'file',accept:'image/*',class:'form-input'});
    up.onchange=e=>{const file=e.target.files[0];if(!file)return;if(file.size>3*1024*1024){showToast('Bild zu groß (max. 3 MB)');return;}const r=new FileReader();r.onload=ev=>{f.image=ev.target.result;render();};r.readAsDataURL(file);};
    imgGrp.appendChild(up);
  }
  modal.appendChild(imgGrp);
  modal.appendChild(fInp('Rezepttitel *','title',f,'text','z.B. Griechischer Salat'));
  modal.appendChild(fTxt('Kurzbeschreibung','description',f,'Ein Satz zum Rezept…',2));
  const g1=el('div',{class:'form-grid'});
  g1.appendChild(fInp('Vorbereitung (Min)','timePrep',f,'number','10'));
  g1.appendChild(fInp('Kochzeit (Min)','timeCook',f,'number','20'));
  g1.appendChild(fInp('Portionen','servings',f,'text','2'));
  g1.appendChild(fSel('Schwierigkeit','difficulty',f,[{value:'easy',label:'Einfach'},{value:'medium',label:'Mittel'},{value:'hard',label:'Schwer'}]));
  modal.appendChild(g1);
  const sGrp=el('div',{class:'form-group'});const sLbl=el('label',{class:'form-label'});sLbl.textContent='Saison';sGrp.appendChild(sLbl);
  const sSel=el('select',{class:'form-select'});['','Frühling','Sommer','Herbst','Winter','Ganzjährig'].forEach(s=>{const o=el('option');o.value=s;o.textContent=s||'— keine —';if(f.season===s)o.selected=true;sSel.appendChild(o);});
  sSel.onchange=e=>f.season=e.target.value;sGrp.append(sLbl,sSel);
  // avoid double label
  sGrp.removeChild(sLbl); const sLbl2=el('label',{class:'form-label'});sLbl2.textContent='Saison';sGrp.insertBefore(sLbl2,sSel);
  modal.appendChild(sGrp);
  const catGrp=el('div',{class:'form-group'});const catLbl=el('label',{class:'form-label'});catLbl.textContent='Kategorien';catGrp.appendChild(catLbl);
  const catGrid=el('div',{class:'cat-grid'});
  db.categories.forEach(cat=>{const chk=el('input',{class:'cat-check',type:'checkbox',id:'c-'+cat.id});chk.checked=f.categories.includes(cat.id);chk.onchange=()=>{if(chk.checked)f.categories.push(cat.id);else f.categories=f.categories.filter(c=>c!==cat.id);};const lbl=el('label',{class:'cat-label',for:'c-'+cat.id});lbl.textContent=cat.emoji+' '+cat.name;catGrid.append(chk,lbl);});
  catGrp.appendChild(catGrid);modal.appendChild(catGrp);
  modal.appendChild(el('hr',{class:'section-divider'}));
  const it=el('div',{style:'font-size:14px;font-weight:600;margin-bottom:8px'});it.textContent='Zutaten';modal.appendChild(it);
  modal.appendChild(buildListEd(f,'ingredients','z.B. 200g Tomaten'));
  const dt=el('div',{style:'margin-top:12px;display:flex;align-items:center;gap:8px'});
  const dc=el('input',{type:'checkbox',id:'dressing-chk'});dc.checked=f.hasDressing;dc.onchange=()=>{f.hasDressing=dc.checked;render();};
  const dl=el('label',{for:'dressing-chk',style:'font-size:13px;cursor:pointer;color:#888'});dl.textContent='Dressing separat (für Salate)';
  dt.append(dc,dl);modal.appendChild(dt);
  if(f.hasDressing){const drt=el('div',{style:'font-size:14px;font-weight:600;margin:10px 0 8px'});drt.textContent='Dressing';modal.appendChild(drt);modal.appendChild(buildListEd(f,'dressing','Zutat'));}
  modal.appendChild(el('hr',{class:'section-divider'}));
  const st=el('div',{style:'font-size:14px;font-weight:600;margin-bottom:8px'});st.textContent='Zubereitung';modal.appendChild(st);
  modal.appendChild(buildListEd(f,'steps','Schritt beschreiben…'));
  modal.appendChild(el('hr',{class:'section-divider'}));
  const nt=el('div',{style:'font-size:14px;font-weight:600;margin-bottom:8px'});nt.textContent='Nährwerte (optional, pro Portion)';modal.appendChild(nt);
  const ng=el('div',{class:'form-grid'});ng.appendChild(fInp('Kalorien (kcal)','kcal',f,'number',''));ng.appendChild(fInp('Protein (g)','protein',f,'number',''));ng.appendChild(fInp('Kohlenhydrate (g)','carbs',f,'number',''));ng.appendChild(fInp('Fett (g)','fat',f,'number',''));modal.appendChild(ng);
  modal.appendChild(el('hr',{class:'section-divider'}));
  modal.appendChild(fTxt('Tipps & Notizen','notes',f,'Variationen, Tricks, persönliche Anmerkungen…',3));
  modal.appendChild(fInp('Quell-Link (optional)','sourceUrl',f,'url','https://…'));
  const br=el('div',{style:'display:flex;gap:8px;margin-top:1.5rem'});
  const sv=el('button',{class:'btn btn-primary'});sv.textContent=state.view==='edit'?'Änderungen speichern':'Rezept speichern';sv.onclick=saveRecipe;
  const cn=el('button',{class:'btn'});cn.textContent='Abbrechen';cn.onclick=()=>{state.view=state.detailRecipe?'detail':'list';render();};
  br.append(sv,cn);modal.appendChild(br);
  overlay.appendChild(modal);return overlay;
}

function buildListEd(f,key,ph) {
  const wrap=el('div');const list=el('div',{class:'list-editor'});
  function rebuild(){
    list.innerHTML='';
    f[key].forEach((item,idx)=>{
      const row=el('div',{class:'list-item-row'});
      const num=el('div',{class:'list-item-num'});num.textContent=idx+1;
      const inp=el('textarea',{class:'form-textarea',rows:'1',placeholder:ph});inp.value=item.text;inp.style.minHeight='36px';
      inp.oninput=e=>{item.text=e.target.value;e.target.style.height='auto';e.target.style.height=e.target.scrollHeight+'px';};
      const rm=el('button',{class:'list-item-remove'});rm.textContent='×';rm.onclick=()=>{f[key]=f[key].filter(i=>i.id!==item.id);rebuild();};
      if(f[key].length<=1)rm.style.visibility='hidden';
      row.append(num,inp,rm);list.appendChild(row);
    });
  }
  rebuild();wrap.appendChild(list);
  const add=el('button',{class:'add-row-btn',type:'button'});add.textContent='+ Zeile hinzufügen';add.onclick=()=>{f[key].push({id:uid(),text:''});rebuild();};
  wrap.appendChild(add);return wrap;
}

let newCat={name:'',emoji:'📁'};
const EMOJIS=['🥗','🍲','🍝','💪','🥦','🌱','⚡','📦','🌅','☀️','🌙','🍰','🫙','🥢','🫒','❄️','🍕','🥩','🐟','🍜','🥘','🧁','🥐','🌮','🥙','🧆','🥣','🍛'];
function buildCatModal(){
  newCat={name:'',emoji:'📁'};
  const overlay=el('div',{class:'modal-overlay'});overlay.onclick=e=>{if(e.target===overlay){state.view='list';render();}};
  const modal=el('div',{class:'modal',style:'max-width:420px'});
  const close=el('button',{class:'modal-close'});close.textContent='×';close.onclick=()=>{state.view='list';render();};modal.appendChild(close);
  const t=el('div',{class:'modal-title'});t.textContent='Neue Kategorie';modal.appendChild(t);
  const ng=el('div',{class:'form-group'});const nl=el('label',{class:'form-label'});nl.textContent='Name';
  const ni=el('input',{class:'form-input',type:'text',placeholder:'z.B. Mexikanisch'});ni.oninput=e=>newCat.name=e.target.value;
  ng.append(nl,ni);modal.appendChild(ng);
  const eg=el('div',{class:'form-group'});const el2=el('label',{class:'form-label'});el2.textContent='Symbol wählen';eg.appendChild(el2);
  const egrid=el('div',{style:'display:flex;flex-wrap:wrap;gap:6px;margin-top:6px'});
  EMOJIS.forEach(em=>{const b=el('button',{class:'emoji-btn',type:'button'});b.textContent=em;b.onclick=()=>{newCat.emoji=em;egrid.querySelectorAll('.emoji-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');};egrid.appendChild(b);});
  eg.appendChild(egrid);modal.appendChild(eg);
  const br=el('div',{style:'display:flex;gap:8px;margin-top:1.5rem'});
  const sv=el('button',{class:'btn btn-primary'});sv.textContent='Kategorie anlegen';sv.onclick=()=>{if(!newCat.name.trim()){showToast('Bitte Namen eingeben');return;}addCategory(newCat.name,newCat.emoji);};
  const cn=el('button',{class:'btn'});cn.textContent='Abbrechen';cn.onclick=()=>{state.view='list';render();};
  br.append(sv,cn);modal.appendChild(br);overlay.appendChild(modal);return overlay;
}

function fInp(label,key,obj,type,ph){const g=el('div',{class:'form-group'});const l=el('label',{class:'form-label'});l.textContent=label;const i=el('input',{class:'form-input',type,placeholder:ph});i.value=obj[key]||'';i.oninput=e=>obj[key]=e.target.value;g.append(l,i);return g;}
function fTxt(label,key,obj,ph,rows){const g=el('div',{class:'form-group'});const l=el('label',{class:'form-label'});l.textContent=label;const t=el('textarea',{class:'form-textarea',placeholder:ph,rows:String(rows)});t.value=obj[key]||'';t.oninput=e=>obj[key]=e.target.value;g.append(l,t);return g;}
function fSel(label,key,obj,opts){const g=el('div',{class:'form-group'});const l=el('label',{class:'form-label'});l.textContent=label;const s=el('select',{class:'form-select'});opts.forEach(o=>{const op=el('option');op.value=o.value;op.textContent=o.label;if(obj[key]===o.value)op.selected=true;s.appendChild(op);});s.onchange=e=>obj[key]=e.target.value;g.append(l,s);return g;}
function el(tag,attrs){const e=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='class')e.className=v;else e.setAttribute(k,v);});return e;}

render();
loadAll();
